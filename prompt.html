<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人工提示词配置</title>
  <style>
    :root {
      --bg1: #fff8f0;
      --bg2: #ffe6ea;
      --card: #ffffffcc;
      --text: #2c1f2e;
      --muted: #6b5a6e;
      --accent: #e94e77;
      --accent-hover: #d63f68;
      --ok: #0f9d58;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(960px, 100%);
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid #ffffff80;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 30px #0000001a;
    }
    h1 { margin: 0 0 10px; }
    .muted { color: var(--muted); font-size: 0.94rem; margin-bottom: 12px; }
    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      border: 2px solid #f4c8d3;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      background: #fff;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #e94e7728; }
    .btns { margin-top: 10px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    .ghost { background: #f7d4de; color: #7b3147; }
    .ok { margin-top: 10px; min-height: 1.2em; color: var(--ok); font-size: 0.92rem; }
    a { color: #b43f63; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="app">
    <h1>人工提示词配置页</h1>
    <div class="muted">只支持你手动输入和保存。主页面会读取这里的内容作为 system prompt。</div>
    <div class="muted">返回主页面：<a href="./index.html">index.html</a></div>

    <label for="systemPrompt">系统提示词（手动维护）</label>
    <textarea id="systemPrompt" placeholder="在这里手动输入你的 system prompt..."></textarea>

    <div class="btns">
      <button id="saveBtn">保存并生效</button>
      <button id="clearBtn" class="ghost">清空</button>
    </div>

    <div class="ok" id="status"></div>
  </main>

  <script>
    const STORAGE_KEY = "ROMANCE_LLM_SYSTEM_PROMPT";
    const el = {
      prompt: document.getElementById("systemPrompt"),
      status: document.getElementById("status"),
      saveBtn: document.getElementById("saveBtn"),
      clearBtn: document.getElementById("clearBtn")
    };

    el.prompt.value = localStorage.getItem(STORAGE_KEY) || "";

    el.saveBtn.addEventListener("click", () => {
      const v = el.prompt.value.trim();
      if (!v) {
        el.status.textContent = "提示词为空，请先输入后再保存。";
        return;
      }
      localStorage.setItem(STORAGE_KEY, v);
      el.status.textContent = "已保存，返回 index.html 生成即可生效。";
    });

    el.clearBtn.addEventListener("click", () => {
      el.prompt.value = "";
      localStorage.removeItem(STORAGE_KEY);
      el.status.textContent = "已清空。";
    });
  </script>
</body>
</html>
